openapi: 3.0.0
info:
  title: Node Entry Validation Behavioral Contract
  version: 1.0.0
  description: |
    Behavioral contract for automatic node-entry validation using existing episode APIs.
    This feature does not add new public endpoints; it strengthens status/tracing semantics.

paths:
  /api/agent/run:
    post:
      summary: Start an agent run that is subject to node-entry validation gates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunRequest'
      responses:
        '202':
          description: Episode accepted for execution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'

  /api/episodes/{episode_id}:
    get:
      summary: Poll episode status and traces, including node-entry validation failures.
      parameters:
        - name: episode_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current episode state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeResponse'

components:
  schemas:
    AgentRunRequest:
      type: object
      required: [task, session_id, agent_name]
      properties:
        task:
          type: string
        session_id:
          type: string
        agent_name:
          type: string
          enum:
            - engineer_planner
            - electronics_planner
            - engineer_coder
            - electronics_engineer
            - engineer_reviewer
            - electronics_reviewer
            - execution_reviewer
            - benchmark_planner
            - benchmark_coder
            - benchmark_reviewer

    AgentRunResponse:
      type: object
      required: [episode_id]
      properties:
        episode_id:
          type: string

    EpisodeResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [RUNNING, PLANNED, WAITING_USER, COMPLETED, FAILED, CANCELLED]
        metadata_vars:
          type: object
          properties:
            detailed_status:
              type: string
            validation_logs:
              type: array
              items:
                type: string
        traces:
          type: array
          items:
            $ref: '#/components/schemas/TraceRecord'

    TraceRecord:
      type: object
      required: [trace_type]
      properties:
        trace_type:
          type: string
          enum: [TOOL_START, TOOL_END, LLM_START, LLM_END, LOG, ERROR, EVENT]
        name:
          type: string
        content:
          type: string
        metadata_vars:
          type: object
          additionalProperties: true
          properties:
            node:
              type: string
            disposition:
              $ref: '#/components/schemas/EntryFailureDisposition'
            reason_code:
              type: string
            reroute_target:
              type: string
            errors:
              type: array
              items:
                $ref: '#/components/schemas/NodeEntryValidationError'

    EntryFailureDisposition:
      type: string
      enum: [allow, reroute_previous, fail_fast]

    NodeEntryValidationError:
      type: object
      required: [code, message, source]
      properties:
        code:
          type: string
        message:
          type: string
        source:
          type: string
          enum: [state, artifact, handover, policy]
        artifact_path:
          type: string
          nullable: true

x-behavioral-requirements:
  - id: BR-001
    text: In non-integration mode, failed node entry MUST emit trace/error payload and reroute to deterministic previous node.
  - id: BR-002
    text: In integration mode, failed node entry MUST transition episode status to FAILED without retry loopback.
  - id: BR-003
    text: Node-entry failure traces MUST include node, disposition, and reason_code fields.
