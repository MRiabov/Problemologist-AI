version: "1.0"
units:
  length: "mm"
  volume: "mm3"
  mass: "g"
  currency: "USD"

constraints:
  benchmark_max_unit_cost_usd: 27.0
  benchmark_max_weight_g: 30.0
  planner_target_max_unit_cost_usd: 18.0
  planner_target_max_weight_g: 20.0

manufactured_parts:
  - part_name: bridge_deck
    part_id: bridge_deck
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 2048.0
    stock_bbox_mm:
      x: 64.0
      y: 8.0
      z: 4.0
    stock_volume_mm3: 2048.0
    removed_volume_mm3: 0.0
    estimated_unit_cost_usd: 7.0
  - part_name: left_support
    part_id: left_support
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 1152.0
    stock_bbox_mm:
      x: 8.0
      y: 12.0
      z: 12.0
    stock_volume_mm3: 1152.0
    removed_volume_mm3: 0.0
    estimated_unit_cost_usd: 3.0
  - part_name: right_support
    part_id: right_support
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 1152.0
    stock_bbox_mm:
      x: 8.0
      y: 12.0
      z: 12.0
    stock_volume_mm3: 1152.0
    removed_volume_mm3: 0.0
    estimated_unit_cost_usd: 3.0
  - part_name: stop_lip
    part_id: stop_lip
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 64.0
    stock_bbox_mm:
      x: 4.0
      y: 8.0
      z: 2.0
    stock_volume_mm3: 64.0
    removed_volume_mm3: 0.0
    estimated_unit_cost_usd: 1.0

cots_parts:
  # Add one item per COTS part.
  # Required fields:
  # - part_id
  # - manufacturer
  # - unit_cost_usd
  # - weight_g
  # - quantity
  # - source
  # - catalog_version
  # - bd_warehouse_commit
  # - catalog_snapshot_id
  # - generated_at
  # Example:
  # - part_id: M3_BOLT
  #   manufacturer: Generic
  #   unit_cost_usd: 0.5
  #   weight_g: 1.2
  #   quantity: 8
  #   source: catalog
  #   catalog_version: "1.0.0"
  #   bd_warehouse_commit: "unknown"
  #   catalog_snapshot_id: "<catalog snapshot hash>"
  #   generated_at: "unknown"

environment_drill_operations:
  # Optional.
  # Declare benchmark-owned fixture drilling only when the benchmark attachment
  # policy allows it.
  # Example:
  # - target_part_id: <benchmark_fixture_part_id>
  #   hole_id: mount_left
  #   diameter_mm: 5.0
  #   depth_mm: 10.0
  #   quantity: 1
  #   notes: Fastener clearance hole into permitted fixture

final_assembly:
  - name: bridge_deck
    config:
      dofs: []
  - name: left_support
    config:
      dofs: []
  - name: right_support
    config:
      dofs: []
  - name: stop_lip
    config:
      dofs: []

drafting:
  sheet_id: sheet-1
  title: Seeded engineer drafting
  views:
    - view_id: front
      target: bridge_deck
      projection: front
      scale: 1.0
      datums: [A, B]
      dimensions:
        - dimension_id: width
          kind: linear
          target: bridge_deck
          value: 64.0
          binding: true
      callouts:
        - callout_id: 1
          label: bridge_deck
          target: bridge_deck
    - view_id: top
      target: left_support
      projection: top
      scale: 1.0
      datums: [A, C]
      dimensions:
        - dimension_id: depth
          kind: linear
          target: left_support
          value: 12.0
          binding: true
      callouts:
        - callout_id: 2
          label: left_support
          target: left_support
    - view_id: side
      target: stop_lip
      projection: side
      scale: 1.0
      datums: [B, C]
      dimensions:
        - dimension_id: height
          kind: linear
          target: stop_lip
          value: 2.0
          binding: true
      callouts:
        - callout_id: 3
          label: stop_lip
          target: stop_lip
  notes: []

totals:
  # `estimated_unit_cost_usd` must include manufactured parts, COTS parts,
  # and any benchmark drilling cost from environment_drill_operations.
  estimated_unit_cost_usd: 14.0
  estimated_weight_g: 11.9232
  estimate_confidence: high

