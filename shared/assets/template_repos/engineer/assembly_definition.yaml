version: "1.0"
units:
  length: "mm"
  volume: "mm3"
  mass: "g"
  currency: "USD"

constraints:
  # Copy benchmark caps from benchmark_definition.yaml, then set tighter planner targets.
  benchmark_max_unit_cost_usd:
  benchmark_max_weight_g:
  planner_target_max_unit_cost_usd:
  planner_target_max_weight_g:

manufactured_parts:
  # Add one item per manufactured part.
  # Required fields:
  # - part_name
  # - part_id
  # - manufacturing_method
  # - material_id
  # - quantity
  # - part_volume_mm3
  # - stock_bbox_mm: {x, y, z}
  # - stock_volume_mm3
  # - removed_volume_mm3
  # - estimated_unit_cost_usd
  # Do NOT replace these with shorthand keys like:
  # - name
  # - method
  # - material
  # - parameters
  # Example:
  # - part_name: bridge_deck
  #   part_id: bridge_deck
  #   manufacturing_method: CNC
  #   material_id: aluminum_6061
  #   quantity: 1
  #   part_volume_mm3: 500000.0
  #   stock_bbox_mm: {x: 500.0, y: 100.0, z: 10.0}
  #   stock_volume_mm3: 500000.0
  #   removed_volume_mm3: 0.0
  #   estimated_unit_cost_usd: 45.0

cots_parts:
  # Add one item per COTS part.
  # Required fields:
  # - part_id
  # - manufacturer
  # - unit_cost_usd
  # - weight_g
  # - quantity
  # - source
  # - catalog_version
  # - bd_warehouse_commit
  # - catalog_snapshot_id
  # - generated_at
  # Example:
  # - part_id: M3_BOLT
  #   manufacturer: Generic
  #   unit_cost_usd: 0.5
  #   weight_g: 1.2
  #   quantity: 8
  #   source: catalog
  #   catalog_version: "1.0.0"
  #   bd_warehouse_commit: "unknown"
  #   catalog_snapshot_id: "<catalog snapshot hash>"
  #   generated_at: "unknown"

environment_drill_operations:
  # Optional.
  # Declare benchmark-owned fixture drilling only when the benchmark attachment
  # policy allows it.
  # Example:
  # - target_part_id: <benchmark_fixture_part_id>
  #   hole_id: mount_left
  #   diameter_mm: 5.0
  #   depth_mm: 10.0
  #   quantity: 1
  #   notes: Fastener clearance hole into permitted fixture

final_assembly:
  # Add PartConfig or SubassemblyEstimate items.
  # Example PartConfig shape:
  # - name: hoist_frame
  #   config:
  #     dofs: []
  # Example SubassemblyEstimate shape:
  # - subassembly_id: lift_module
  #   parts:
  #     - name: spool
  #       config:
  #         dofs: ["rotation_z"]
  #   joints:
  #     - joint_id: spool_axle
  #       parts: ["spool", "frame"]
  #       type: revolute
  # Do NOT use a list of bare strings here.
  # Use only canonical manufacturing enum values elsewhere in this file: CNC, 3DP, IM.

totals:
  # `estimated_unit_cost_usd` must include manufactured parts, COTS parts,
  # and any benchmark drilling cost from environment_drill_operations.
  estimated_unit_cost_usd:
  estimated_weight_g:
  estimate_confidence:

dfm_suggestions: []
