interface:
  display_name: "Benchmark Plan Reviewer"
  short_description: "Review benchmark planner handoffs against strict geometry, motion, precise-path, and scientifically derived calculation contracts."
  default_prompt: "Use this skill when reviewing benchmark planner handoffs before coding starts. Read the latest planner artifacts, the stage manifest, and the relevant architecture docs; follow the checklist in `SKILL.md` and `references/review_contracts.md`; inspect any render or drawing evidence with inspect_media(...) and preview_drawing() when needed; compare `assembly_definition.yaml.motion_forecast` to `precise_path_definition.yaml` when present and decide whether the declared path is physically satisfiable; treat a missing or hand-wavy payload trajectory estimate as a strong reject because downstream machinery timing and sizing are then ungrounded; require `plan.md`'s detailed calculation section to fully derive the path-relevant distances, times, speeds, clearances, and tolerances; treat the planner evidence and technical-drawing scripts as the source of the approved benchmark contract; verify exact label, quantity, COTS identity, motion, timing, speed plausibility, and schema grounding; and write the stage-scoped decision/comments YAML pair under reviews/ before submitting the review gate."
