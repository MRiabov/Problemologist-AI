interface:
  display_name: "Engineer Plan Reviewer"
  short_description: "Review engineering plan, execution, and refusal handoffs with formula-backed motion and payload trajectory checks."
  default_prompt: "Use $engineer-plan-reviewer to review engineering plan, execution, or refusal handoffs against the stage manifest and the checklists in `SKILL.md`, `references/review_contracts.md`, and `references/motion-trajectory-review.md`; inspect renders or simulation media through the runtime media-inspection path when they exist, and use list_render_bundles(), query_render_bundle(), or pick_preview_pixel() when the review depends on exact bundle history or a screen-space point; treat the planner evidence and technical-drawing scripts as the source of the approved plan; verify exact inventory grounding, formula-backed motion and payload trajectory derivations, motion-contract plausibility, and review-output schema correctness; and write the stage-specific decision/comments YAML pair before submitting through the review gate."
