interface:
  display_name: "Engineer Planner"
  short_description: "Plan implementation-ready engineering handoffs with formula-driven dimensions and rigorous geometry/physics derivations."
  default_prompt: "Use this skill when turning benchmark handoff context into planner-owned artifacts. Keep plan.md, todo.md, benchmark_definition.yaml, and assembly_definition.yaml internally consistent; treat benchmark-owned geometry and benchmark_script.py as read-only context; base every size, offset, and clearance on explicit source geometry or formulas; treat weak geometry or physics derivations as a hard failure because handoffs that cannot rigorously justify the motion or placement math have repeatedly failed downstream; derive moving fixture placement from the declared axis or joint chain; validate cost, weight, and motion contracts; inspect draft renders with preview(...) or preview_drawing() when available; prefer the more stable, cheaper, simpler, and more manufacturable option when multiple solutions are valid; and submit only when the handoff is implementation-ready."
