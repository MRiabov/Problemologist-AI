transcript:
- node: engineer_planner
  steps:
  - thought: Seed a justified planner DOF so plan-review can pass.
    tool_name: write_file
    tool_args:
      path: plan.md
      overwrite: true
      content_file: INT-075/engineer_planner/entry_01/01__plan.md
    expected_observation: success
  - tool_name: write_file
    tool_args:
      path: todo.md
      overwrite: true
      content_file: INT-075/engineer_planner/entry_01/02__todo.md
    expected_observation: success
  - tool_name: write_file
    tool_args:
      path: assembly_definition.yaml
      overwrite: true
      content_file: INT-075/engineer_planner/entry_01/03__assembly_definition.yaml
    expected_observation: success
  - tool_name: write_file
    tool_args:
      path: benchmark_definition.yaml
      overwrite: true
      content_file: INT-075/engineer_planner/entry_01/04__benchmark_definition.yaml
    expected_observation: success
  - tool_name: submit_plan
    expected_observation: submitted
  - finished: true
    summary: 'INT-074 execution scenario: planner submitted justified plan.'
- node: electronics_planner
  steps:
  - thought: No electronics changes; submit handoff.
    tool_name: submit_plan
    expected_observation: submitted
  - finished: true
    summary: 'INT-074 execution scenario: electronics planner submitted.'
- node: engineer_plan_reviewer
  steps:
  - finished: true
    review:
      decision: APPROVED
      reason: Planner justification accepted for planner_link.
      required_fixes: []
      checklist:
        dof_minimality: fail
- node: engineer_plan_reviewer
  steps:
  - finished: true
    review:
      decision: APPROVED
      reason: Planner justification accepted for planner_link.
      required_fixes: []
- node: engineer_coder
  steps:
  - thought: Introduce over-actuated execution deviation.
    tool_name: write_file
    tool_args:
      path: assembly_definition.yaml
      overwrite: true
      content_file: INT-075/engineer_coder/entry_01/01__assembly_definition.yaml
    expected_observation: success
  - tool_name: write_file
    tool_args:
      path: script.py
      overwrite: true
      content_file: INT-075/engineer_coder/entry_01/02__script.py
    expected_observation: success
  - thought: Seed execution-review handoff evidence.
    tool_name: execute_command
    tool_args:
      command: |
        python3 - <<'PY'
        import hashlib
        import os
        import time
        from pathlib import Path

        from shared.models.simulation import MultiRunResult, SimulationMetrics, SimulationResult
        from shared.workers.schema import ReviewManifest, ValidationResultRecord

        script_path = Path("script.py")
        script_sha256 = hashlib.sha256(script_path.read_bytes()).hexdigest()
        revision = os.environ["REPO_REVISION"]
        seed_ts = time.time()

        validation = ValidationResultRecord(
            success=True,
            message="Validation completed",
            timestamp=seed_ts,
            script_path="script.py",
            script_sha256=script_sha256,
            verification_result=MultiRunResult(
                num_scenes=1,
                success_count=1,
                success_rate=1.0,
                is_consistent=True,
                individual_results=[SimulationMetrics(success=True)],
                fail_reasons=[],
                scene_build_count=1,
                backend_run_count=1,
                batched_execution=True,
            ),
        )
        simulation = SimulationResult(
            success=True,
            summary="Goal achieved in green zone.",
            render_paths=[],
            confidence="high",
        )
        manifest = ReviewManifest(
            status="ready_for_review",
            reviewer_stage="engineering_execution_reviewer",
            session_id=os.environ["SESSION_ID"],
            script_path="script.py",
            script_sha256=script_sha256,
            validation_success=True,
            validation_timestamp=seed_ts,
            simulation_success=True,
            simulation_summary="Goal achieved in green zone.",
            simulation_timestamp=seed_ts,
            goal_reached=True,
            revision=revision,
            renders=[],
        )

        Path("validation_results.json").write_text(
            validation.model_dump_json(indent=2), encoding="utf-8"
        )
        Path("simulation_result.json").write_text(
            simulation.model_dump_json(indent=2), encoding="utf-8"
        )
        manifests_dir = Path(".manifests")
        manifests_dir.mkdir(parents=True, exist_ok=True)
        (manifests_dir / "engineering_execution_review_manifest.json").write_text(
            manifest.model_dump_json(indent=2), encoding="utf-8"
        )
        print("handoff seeded")
        PY
    expected_observation: handoff seeded
  - finished: true
    journal: 'INT-074 execution scenario: coder wrote over-actuated assembly deviation.'
- node: electronics_reviewer
  steps:
  - finished: true
    review:
      decision: APPROVED
      reason: Electronics stage is a no-op for this scenario.
      required_fixes: []
- node: engineer_execution_reviewer
  steps:
  - finished: true
    review:
      decision: APPROVED
      reason: Execution deviation is justified by planner_link.
      required_fixes: []
      checklist:
        dof_deviation_justified: fail
engineer_plan_reviewer:
  review:
    decision: APPROVED
    reason: Planner justification accepted for planner_link.
    required_fixes: []
    checklist:
      dof_minimality: fail
engineer_execution_reviewer:
  review:
    decision: APPROVED
    reason: Execution deviation is justified by planner_link.
    required_fixes: []
    checklist:
      dof_deviation_justified: fail
