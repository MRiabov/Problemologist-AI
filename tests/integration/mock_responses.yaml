                ball.label = "projectile_ball"
                ball.metadata = PartMetadata(material_id="abs", fixed=False)

                benchmark_compound = Compound(children=[ground, obstacle, ball])
                benchmark_compound.label = "benchmark_scene"
                benchmark_compound.metadata = CompoundMetadata(fixed=False)

