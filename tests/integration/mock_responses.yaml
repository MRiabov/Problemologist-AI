                      dofs: [tx, ty, tz, rx]
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "script.py"
              content: |
                from build123d import Box
                from shared.models.schemas import PartMetadata
                from shared.workers.workbench_models import ManufacturingMethod

                def build():
                    p = Box(1, 1, 1)
                    p.label = "projectile_ball"
                    p.metadata = PartMetadata(
                        material_id="abs",
                        fixed=False,
                        manufacturing_method=ManufacturingMethod.THREE_DP,
                    )
                    return p
              overwrite: true
            expected_observation: "success"
          - finished: true
            journal: "INT-074 execution scenario: coder wrote over-actuated assembly deviation."
