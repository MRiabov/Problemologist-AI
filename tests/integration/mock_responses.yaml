  # INT-011: Planner target caps validation (No specific mock needed as it's a validation test)

  INT-014:
    transcript:
      - node: engineer_planner
        steps:
          - thought: "I will design a mechanism with a servo motor using MOCK-MOTOR-ID."
            tool_name: "write_file"
            tool_args:
              path: "plan.md"
              content: |
                ## 1. Solution Overview
                Mechanism with MOCK-MOTOR-ID.
                ## 2. Parts List
                - MOCK-MOTOR-ID (Servo Motor)
                ## 3. Assembly Strategy
                1. Attach motor.
                ## 4. Cost & Weight Budget
                - $20
                ## 5. Risk Assessment
                - Low.
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args: { path: "todo.md", content: "- [ ] Design with MOCK-MOTOR-ID", overwrite: true }
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "assembly_definition.yaml"
              content: |
                version: '1.0'
                constraints:
                  benchmark_max_unit_cost_usd: 100
                  benchmark_max_weight_g: 1000
                  planner_target_max_unit_cost_usd: 50
                  planner_target_max_weight_g: 500
                totals:
                  estimated_unit_cost_usd: 10
                  estimated_weight_g: 100
                  estimate_confidence: high
                manufactured_parts: []
                cots_parts:
                  - part_id: "MOCK-MOTOR-ID"
                    manufacturer: "Mock Motors Inc."
                    unit_cost_usd: 10.0
                    quantity: 1
                    source: "internal"
                    reproducibility:
                      catalog_version: "test-v1"
                      bd_warehouse_commit: "mock-commit"
                      catalog_snapshot_id: "snapshot-int-014"
                      generated_at: "2026-01-01T00:00:00Z"
                final_assembly: []
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "objectives.yaml"
              content: |
                objectives:
                  goal_zone: {min: [5,5,5], max: [10,10,10]}
                  build_zone: {min: [-50,-50,0], max: [50,50,50]}
                moved_object:
                  label: "projectile_ball"
                  shape: "sphere"
                  start_position: [0,0,20]
                  runtime_jitter: [1,1,1]
                simulation_bounds: {min: [-100,-100,0], max: [100,100,100]}
                constraints: {max_unit_cost: 50, max_weight_g: 1000.0}
              overwrite: true
            expected_observation: "success"
          - finished: true
            summary: "Plan with MOCK-MOTOR-ID generated."
            thought: "Plan is complete."
      - node: electronics_planner
        steps:
          - thought: "No electronics needed."
            tool_name: "write_file"
            tool_args: { path: "todo.md", content: "- [x] Initial plan\n- [x] Check electronics", overwrite: true }
            expected_observation: "success"
          - finished: true
            summary: "No electronics needed."
      - node: engineer_coder
        steps:
          - thought: "Implementing the design."
            finished: true
            journal: "Implemented mechanism with MOCK-MOTOR-ID."
            generated_code: |
              from build123d import *
              import os
              import trimesh
              os.makedirs('assets', exist_ok=True)
              b = Box(10,10,10)
              export_stl(b, 'assets/box.stl')
              mesh = trimesh.load('assets/box.stl')
              mesh.export('assets/box.glb', file_type='glb')
              with open('script.py', 'w') as f: f.write('from build123d import *\\ndef build(): return Box(10,10,10)')
      - node: engineer_reviewer
        steps:
          - finished: true
            review:
              decision: "APPROVED"
              reason: "The design satisfies all requirements."
              required_fixes: []

