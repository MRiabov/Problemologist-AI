  # Benchmark workflow (detected by prompt or UUID session_id)
  benchmark:
    planner:
      thought: "Designing benchmark scenario."
      plan:
        theme: "benchmark_test"
        reasoning: "Creating a simple path planning task."
        params: { wall_height: 5, goal_pos: [10, 10, 0] }
      reasoning: "Creating a simple benchmark."
      tool_calls:
        - name: "write_file"
          input: 
            path: "plan.md"
            content: |
              ## Learning Objective
              - Move a sphere into the goal zone.
              ## Geometry
              - Simple box environment around origin.
              ## Objectives
              - Reach goal while avoiding forbid zone.
            overwrite: true
        - name: "write_file"
          input: { path: "todo.md", content: "- [ ] Test benchmark", overwrite: true }
        - name: "write_file"
          input: 
            path: "assembly_definition.yaml"
            content: |
              version: '1.0'
              constraints:
                benchmark_max_unit_cost_usd: 50
                benchmark_max_weight_g: 1200
                planner_target_max_unit_cost_usd: 25
                planner_target_max_weight_g: 600
              totals:
                estimated_unit_cost_usd: 10
                estimated_weight_g: 100
                estimate_confidence: high
              manufactured_parts: []
              cots_parts: []
              final_assembly: []
            overwrite: true
        - name: "write_file"
          input: 
            path: "objectives.yaml"
            content: |
              objectives:
                goal_zone:
                  min: [6, -2, 0]
                  max: [10, 2, 4]
                forbid_zones:
                  - name: "obstacle_collision_zone"
                    min: [2, -3, 0]
                    max: [4, 3, 4]
                build_zone:
                  min: [-10, -10, -10]
                  max: [10, 10, 10]
              simulation_bounds:
                min: [-30, -30, -30]
                max: [30, 30, 30]
              moved_object:
                label: "projectile_ball"
                shape: "sphere"
                static_randomization:
                  radius: [1, 2]
                start_position: [0, 0, 0]
