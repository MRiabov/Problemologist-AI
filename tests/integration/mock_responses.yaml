# NOTE: distances are in meters. So box with size (30,30,30) is a 30*30*30 m box.
scenarios:
  # Optional hardening keys for any node scenario entry:
  # - expected_llm_inputs:
  #     contains: ["must appear in every LM input"]
  #     not_contains: ["must never appear"]
  #     per_call:
  #       - call_index: 2
  #         contains: ["only required on call 2"]
  # - expected_tool_calls:
  #     - name: "write_file"
  #       args_contains: ["plan.md"]
  #       args_not_contains: ["forbidden/path"]
  # - expected_tool_outputs:
  #     - contains: ["success"]
  #       not_contains: ["error"]
  # All keys are optional and only enforced when present.

  # INT-011: Planner target caps validation (No specific mock needed as it's a validation test)

  INT-005:
    transcript:
      - node: engineer_planner
        steps:
          - thought: "Create engineer planner artifacts for submit_plan gate verification."
            tool_name: "write_file"
            tool_args:
              path: "plan.md"
              content: |
                ## 1. Solution Overview
                Engineer planner INT-005 submission gate scenario.
                ## 2. Parts List
                - Test box (manufactured, abs)
                ## 3. Assembly Strategy
                1. Build a simple static part.
                ## 4. Cost & Weight Budget
                - Estimated unit cost: $10
                - Estimated weight: 100g
                ## 5. Risk Assessment
                - Low complexity.
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              {
                path: "todo.md",
                content: "- [ ] Build test part",
                overwrite: true,
              }
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "assembly_definition.yaml"
              content: |
                version: '1.0'
                constraints:
                  benchmark_max_unit_cost_usd: 500
                  benchmark_max_weight_g: 1000
                  planner_target_max_unit_cost_usd: 200
                  planner_target_max_weight_g: 500
                totals:
                  estimated_unit_cost_usd: 10
                  estimated_weight_g: 100
                  estimate_confidence: high
                manufactured_parts: []
                cots_parts: []
                final_assembly: []
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "objectives.yaml"
              content: |
                objectives:
                  goal_zone: {min: [0,0,0], max: [1,1,1]}
                  build_zone: {min: [-10,-10,-10], max: [10,10,10]}
                simulation_bounds: {min: [-20,-20,-20], max: [20,20,20]}
                moved_object: {label: obj, shape: sphere, start_position: [0,0,0], runtime_jitter: [0,0,0]}
                constraints: {max_unit_cost: 50, max_weight_g: 1000.0}
              overwrite: true
            expected_observation: "success"
          - tool_name: "submit_plan"
            expected_observation: "submitted"
          - finished: true
            summary: "INT-005 engineer planner artifacts generated and submitted."

