# NOTE: distances are in meters. So box with size (30,30,30) is a 30*30*30 m box.
scenarios:
  # Optional hardening keys for any node scenario entry:
  # - expected_llm_inputs:
  #     contains: ["must appear in every LM input"]
  #     not_contains: ["must never appear"]
  #     per_call:
  #       - call_index: 2
  #         contains: ["only required on call 2"]
  # - expected_tool_calls:
  #     - name: "write_file"
  #       args_contains: ["plan.md"]
  #       args_not_contains: ["forbidden/path"]
  # - expected_tool_outputs:
  #     - contains: ["success"]
  #       not_contains: ["error"]
  # All keys are optional and only enforced when present.

  # INT-011: Planner target caps validation (No specific mock needed as it's a validation test)

  INT-005:
    transcript:
      - node: engineer_planner
        steps:
          - thought: "Create engineer planner artifacts for submit_plan gate verification."
            tool_name: "write_file"
            tool_args:
              path: "plan.md"
              content: |
                ## 1. Solution Overview
                Engineer planner INT-005 submission gate scenario.
                ## 2. Parts List
                - Test box (manufactured, abs)
                ## 3. Assembly Strategy
                1. Build a simple static part.
                ## 4. Cost & Weight Budget
                - Estimated unit cost: $10
                - Estimated weight: 100g
                ## 5. Risk Assessment
                - Low complexity.
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              {
                path: "todo.md",
                content: "- [ ] Build test part",
                overwrite: true,
              }
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "assembly_definition.yaml"
              content: |
                version: '1.0'
                constraints:
                  benchmark_max_unit_cost_usd: 500
                  benchmark_max_weight_g: 1000
                  planner_target_max_unit_cost_usd: 200
                  planner_target_max_weight_g: 500
                totals:
                  estimated_unit_cost_usd: 10
                  estimated_weight_g: 100
                  estimate_confidence: high
                manufactured_parts: []
                cots_parts: []
                final_assembly: []
              overwrite: true
            expected_observation: "success"
          - tool_name: "write_file"
            tool_args:
              path: "benchmark_definition.yaml"
              content: |
                objectives:
                  goal_zone: {min: [0,0,0], max: [1,1,1]}
                  build_zone: {min: [-10,-10,-10], max: [10,10,10]}
                simulation_bounds: {min: [-20,-20,-20], max: [20,20,20]}
                moved_object: {label: obj, shape: sphere, material_id: abs, start_position: [0,0,0], runtime_jitter: [0,0,0]}
                benchmark_parts:
                  - part_id: environment_fixture
                    label: environment_fixture
                    metadata:
                      fixed: true
                      material_id: aluminum_6061
                constraints: {max_unit_cost: 50, max_weight_g: 1000.0}
              overwrite: true
            expected_observation: "success"
          - tool_name: "submit_plan"
            expected_observation: "submitted"
          - finished: true
            summary: "INT-005 engineer planner artifacts generated and submitted."
      - node: electronics_planner
        steps:
          - thought: "No electronics changes are needed for INT-005; submit the handoff."
            tool_name: "submit_plan"
            expected_observation: "submitted"
          - finished: true
            summary: "INT-005 electronics planner submission complete."
      - node: engineer_plan_reviewer
        steps:
          - finished: true
            review:
              decision: "APPROVED"
              reason: "INT-005 planner artifacts satisfy the planning gate."
              required_fixes: []
      - node: engineer_coder
        steps:
          - tool_name: "write_file"
            tool_args:
              path: "script.py"
              content: |
                from build123d import Box
                from shared.models.schemas import PartMetadata
                from shared.workers.workbench_models import ManufacturingMethod

                def build():
                    part = Box(1, 1, 1)
                    part.label = "guide_block"
                    part.metadata = PartMetadata(
                        material_id="abs",
                        fixed=True,
                        manufacturing_method=ManufacturingMethod.THREE_DP,
                    )
                    return part
              overwrite: true
            expected_observation: "success"
          - finished: true
            journal: "INT-005 coder produced minimal execution artifact."
      - node: electronics_reviewer
        steps:
          - finished: true
            review:
              decision: "APPROVED"
              reason: "Electronics stage is a no-op for INT-005."
              required_fixes: []
      - node: engineer_execution_reviewer
        steps:
          - finished: true
            review:
              decision: "APPROVED"
              reason: "INT-005 execution artifacts are valid."
              required_fixes: []

