repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, "--select=E9,F,I"]
        files: \.py$
        exclude: ^(tests/integration/mock_responses/|shared/assets/template_repos/)
      - id: ruff-format
        files: \.py$
        exclude: ^(tests/integration/mock_responses/|shared/assets/template_repos/)
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm==1.0.0
          - mdformat-frontmatter==2.0.10
  - repo: local
    hooks:
      - id: sync-skill-mirrors
        name: sync-skill-mirrors
        entry: bash -c "uv run python scripts/sync_skill_mirrors.py --check"
        language: system
        pass_filenames: false
        files: ^(skills/|\.agents/skills/)
      - id: record-skills-revision
        name: record-skills-revision
        entry: bash -c "uv run python scripts/update_skills_lock.py && git add config/skills_repo.lock.json"
        language: system
        pass_filenames: false
        always_run: true
      - id: generate-openapi
        name: generate-openapi
        entry: bash -c "uv run python scripts/generate_openapi.py && git add controller_openapi.json worker_openapi.json"
        language: system
        pass_filenames: false
        files: \.py$
      - id: generate-frontend-client
        name: generate-frontend-client
        entry: bash -c "cd frontend && npm run gen:api && git add src/api/generated"
        language: system
        pass_filenames: false
        files: \.py$
