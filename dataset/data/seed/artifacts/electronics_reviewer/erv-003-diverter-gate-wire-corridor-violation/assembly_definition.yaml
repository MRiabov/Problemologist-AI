version: "1.0"
constraints:
  benchmark_max_unit_cost_usd: 65.0
  benchmark_max_weight_g: 1200.0
  planner_target_max_unit_cost_usd: 52.0
  planner_target_max_weight_g: 900.0
manufactured_parts:
  - part_name: gate_bracket
    part_id: gate_bracket
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 32000.0
    stock_bbox_mm:
      x: 80.0
      y: 40.0
      z: 20.0
    stock_volume_mm3: 64000.0
    removed_volume_mm3: 32000.0
    estimated_unit_cost_usd: 14.0
  - part_name: mount_base
    part_id: mount_base
    manufacturing_method: CNC
    material_id: aluminum_6061
    quantity: 1
    part_volume_mm3: 57600.0
    stock_bbox_mm:
      x: 180.0
      y: 80.0
      z: 8.0
    stock_volume_mm3: 115200.0
    removed_volume_mm3: 57600.0
    estimated_unit_cost_usd: 10.0
cots_parts:
  - part_id: gearmotor_12v_60rpm
    manufacturer: pololu
    unit_cost_usd: 18.5
    quantity: 1
    source: catalog
electronics:
  power_supply:
    type: mains_ac_rectified
    voltage_dc: 12.0
    max_current_a: 2.0
    location: [-140.0, -60.0, 130.0]
  components:
    - component_id: gate_motor
      type: MOTOR
      cots_part_id: gearmotor_12v_60rpm
      assembly_part_ref: gate_bracket
      rated_voltage: 12.0
      stall_current_a: 1.3
  wiring:
    - wire_id: gate_motor_pos
      from:
        component: supply
        terminal: v+
      to:
        component: gate_motor
        terminal: +
      gauge_awg: 20
      length_mm: 310.0
      waypoints:
        - [-120.0, -55.0, 120.0]
        - [15.0, 0.0, 102.0]
        - [55.0, 18.0, 92.0]
      routed_in_3d: true
    - wire_id: gate_motor_ret
      from:
        component: gate_motor
        terminal: "-"
      to:
        component: supply
        terminal: "0"
      gauge_awg: 20
      length_mm: 305.0
      waypoints:
        - [-118.0, -58.0, 118.0]
        - [12.0, -3.0, 100.0]
        - [52.0, 16.0, 90.0]
      routed_in_3d: true
final_assembly:
  - name: diverter_gate
    config:
      dofs:
        - rotate_z
      control:
        mode: ON_OFF
        speed: 1.0
  - name: gate_bracket
    config:
      dofs: []
  - name: mount_base
    config:
      dofs: []
totals:
  estimated_unit_cost_usd: 44.5
  estimated_weight_g: 705.0
  estimate_confidence: high
dfm_suggestions:
  - Keep the bracket stock rectangular to reduce CNC setup changes.
