drafting:
  sheet_id: "sheet_1"
  title: "Timed gate technical drawing"
  units: "mm"
  projection_standard: "orthographic"
  views:
    - view_id: "timed_gate_overview"
      target: "gate_housing"
      projection: "top"
      scale: 1.0
      datums: ["A", "B"]
      dimensions:
        - dimension_id: "d_gate_housing_span"
          kind: "linear"
          target: "gate_housing"
          value: 120.0
          tolerance: "nominal"
          note: "Housing span keeps the gate swing envelope explicit."
          plan_ref: "plan.md"
        - dimension_id: "d_drive_motor_clearance"
          kind: "clearance"
          target: "drive_motor"
          value: 18.0
          tolerance: "nominal"
          note: "Servo clearance preserves the swing path."
          plan_ref: "plan.md"
      callouts:
        - callout_id: 1
          label: "drive motor"
          target: "drive_motor"
          note: "Catalog-backed DS3218 import."
        - callout_id: 2
          label: "pivot arm"
          target: "gate_pivot_arm"
          note: "Only moving benchmark-side element."
      notes:
        - note_id: "n_timed_gate_overview"
          text: "The gate swing envelope and keep-out zone are the binding interfaces."
          critical: true
          plan_ref: "plan.md"
environment_drill_operations: []
