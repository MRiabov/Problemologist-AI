drafting:
  sheet_id: "sheet_1"
  title: "Fast-transfer technical drawing"
  units: "mm"
  projection_standard: "orthographic"
  views:
    - view_id: "fast_transfer_overview"
      target: "launch_lane"
      projection: "top"
      scale: 1.0
      datums: ["A", "B"]
      dimensions:
        - dimension_id: "d_launch_lane_span"
          kind: "linear"
          target: "launch_lane"
          value: 620.0
          tolerance: "nominal"
          note: "Long lane span keeps the transfer envelope obvious."
          plan_ref: "plan.md"
        - dimension_id: "d_accelerator_roller_diameter"
          kind: "diameter"
          target: "accelerator_roller"
          value: 48.0
          tolerance: "nominal"
          note: "Driven roller size anchors the only active transfer motion."
          plan_ref: "plan.md"
      callouts:
        - callout_id: 1
          label: "accelerator roller"
          target: "accelerator_roller"
          note: "Single driven roller."
        - callout_id: 2
          label: "goal brake tray"
          target: "goal_brake_tray"
          note: "Tray stays passive-looking."
      notes:
        - note_id: "n_fast_transfer_overview"
          text: "Only the accelerator roller may move; the brake tray remains passive-looking."
          critical: true
          plan_ref: "plan.md"
environment_drill_operations: []
final_assembly:
  - name: launch_lane
    config:
      dofs: []
  - name: accelerator_roller
    config:
      dofs:
        - rotate_x
      control:
        mode: CONSTANT
        speed: 1.4
  - name: speed_bump_guard
    config:
      dofs: []
  - name: goal_brake_tray
    config:
      dofs:
        - rotate_y
      control:
        mode: ON_OFF
        speed: 0.2
totals:
  estimated_unit_cost_usd: 56.0
  estimated_weight_g: 1245.0
  estimate_confidence: high
dfm_suggestions:
  - Keep the driven roller as the only powered benchmark element so the review gate can attribute all motion cleanly.
  - Use a shallow brake tray lip instead of extra active slowing features near the goal.
