final_assembly:
  - name: floor_plate
    config:
      dofs: []
  - name: support_tower
    config:
      dofs: []
  - name: raised_goal_shelf
    config:
      dofs: []
  - name: lift_carriage
    config:
      dofs:
        - slide_z
      control:
        mode: ON_OFF
        speed: 1.0
  - name: drive_motor
    config:
      dofs: []
drafting:
  sheet_id: "sheet-1"
  title: "Motorized Raised Shelf Drawing"
  units: "mm"
  projection_standard: "orthographic"
  views:
    - view_id: "front"
      target: "lift_carriage"
      projection: "front"
      scale: 1.0
      datums: ["A", "B"]
      dimensions:
        - dimension_id: "carriage_thickness"
          kind: "linear"
          target: "lift_carriage"
          value: 18.0
          tolerance: "+/- 0.5"
          binding: true
          note: "Keep the carriage plate thin enough to clear the tower."
          plan_ref: "plan.md"
      callouts:
        - callout_id: 1
          label: "lift carriage"
          target: "lift_carriage"
          plan_ref: "plan.md"
      notes:
        - note_id: "n1"
          text: "Benchmark-side motion is limited to the single slide_z axis."
          critical: true
          plan_ref: "plan.md"
totals:
  estimated_unit_cost_usd: 73.0
  estimated_weight_g: 1275.0
  estimate_confidence: high
dfm_suggestions:
  - Keep the lift carriage as one plate with simple guide features to avoid extra benchmark-side joints.
  - Reuse the same tower faces as the linear-guide datum to keep the benchmark local motion deterministic.
