drafting:
  sheet_id: "sheet-1"
  title: "Side-Deflect Ramp Drawing"
  units: "mm"
  projection_standard: "orthographic"
  views:
    - view_id: "front"
      target: "deflector_ramp"
      projection: "front"
      scale: 1.0
      datums: ["A", "B"]
      dimensions:
        - dimension_id: "ramp_thickness"
          kind: "linear"
          target: "deflector_ramp"
          value: 15.0
          tolerance: "+/- 0.5"
          binding: true
          note: "Keep the ramp plate thick enough to resist ball impact deformation."
          plan_ref: "plan.md"
        - dimension_id: "ramp_angle"
          kind: "angular"
          target: "deflector_ramp"
          value: 30.0
          tolerance: "+/- 1.0"
          binding: true
          note: "Deflector angle must remain 30° ±1° for reliable ball redirection."
          plan_ref: "plan.md"
      callouts:
        - callout_id: 1
          label: "deflector ramp"
          target: "deflector_ramp"
          plan_ref: "plan.md"
      notes:
        - note_id: "n1"
          text: "All benchmark fixtures are fixed. Only the projectile ball moves."
          critical: true
          plan_ref: "plan.md"
totals:
  estimated_unit_cost_usd: 29.0
  estimated_weight_g: 720.0
  estimate_confidence: high
dfm_suggestions:
  - Keep the deflector ramp as one monolithic angled plate to avoid extra benchmark-side joints.
  - Use the same base_plate top face as the ramp mounting datum to keep the benchmark geometry deterministic.
