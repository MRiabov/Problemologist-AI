drafting:
  sheet_id: sheet_1
  title: Freestanding no-drill transfer
  units: mm
  projection_standard: orthographic
  views:
  - view_id: top_path_overview
    target: freestanding_base
    projection: top
    scale: 1.0
    datums: [A, B]
    dimensions:
    - dimension_id: d_base_length
      kind: linear
      target: freestanding_base
      value: 620.0
      tolerance: nominal
      binding: true
      note: Base length spans the transfer corridor.
    - dimension_id: d_base_width
      kind: linear
      target: freestanding_base
      value: 180.0
      tolerance: nominal
      binding: true
      note: Base width provides stability without environment attachment.
  - view_id: front_capture
    target: capture_funnel
    projection: front
    scale: 1.0
    datums: [A, C]
    dimensions:
    - dimension_id: d_funnel_width
      kind: linear
      target: capture_funnel
      value: 160.0
      tolerance: nominal
      binding: true
      note: Funnel width covers the spawn jitter band.
    - dimension_id: d_funnel_height
      kind: linear
      target: capture_funnel
      value: 40.0
      tolerance: nominal
      binding: true
      note: Funnel height gives the inlet enough vertical margin.
  - view_id: side_exit
    target: exit_tray
    projection: side
    scale: 1.0
    datums: [B, C]
    dimensions:
    - dimension_id: d_tray_height
      kind: linear
      target: exit_tray
      value: 35.0
      tolerance: nominal
      binding: true
      note: Tray height damps the final approach into the goal zone.
    - dimension_id: d_tray_depth
      kind: linear
      target: exit_tray
      value: 140.0
      tolerance: nominal
      binding: true
      note: Tray depth overlaps the goal zone.
  notes:
  - note_id: note_no_attachment
    text: "No environment attachment: all parts mount to `freestanding_base` only."
  - note_id: note_ballast_material
    text: "`ballast_block` uses aluminum_6061 to keep the total weight under the planner target."
