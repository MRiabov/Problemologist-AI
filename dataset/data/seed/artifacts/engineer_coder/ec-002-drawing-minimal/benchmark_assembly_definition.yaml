drafting:
  sheet_id: sheet_1
  title: Gap bridge benchmark technical drawing
  units: mm
  projection_standard: orthographic
  views:
  - view_id: front_fixture_overview
    target: left_start_deck
    projection: front
    scale: 1.0
    datums: [A, B]
    dimensions:
    - dimension_id: d_front_left_start_deck_width
      kind: linear
      target: left_start_deck
      value: 180.0
      tolerance: nominal
      binding: true
      note: Start deck width frames the launch side.
      plan_ref: plan.md#assembly-strategy
    - dimension_id: d_front_right_goal_deck_width
      kind: linear
      target: right_goal_deck
      value: 180.0
      tolerance: nominal
      binding: true
      note: Goal deck width frames the capture side.
      plan_ref: plan.md#assembly-strategy
  - view_id: top_clearance
    target: bridge_reference_table
    projection: top
    scale: 1.0
    datums: [A, C]
    dimensions:
    - dimension_id: d_top_bridge_reference_table_length
      kind: linear
      target: bridge_reference_table
      value: 140.0
      tolerance: nominal
      binding: true
      note: Reference table length keeps the bridge legible.
      plan_ref: plan.md#assembly-strategy
    - dimension_id: d_top_gap_floor_guard_length
      kind: linear
      target: gap_floor_guard
      value: 160.0
      tolerance: nominal
      binding: true
      note: Floor guard length marks the bridge clearance constraint.
      plan_ref: plan.md#assembly-strategy
  - view_id: side_guard_profile
    target: gap_floor_guard
    projection: side
    scale: 1.0
    datums: [B, C]
    dimensions:
    - dimension_id: d_side_gap_floor_guard_height
      kind: linear
      target: gap_floor_guard
      value: 40.0
      tolerance: nominal
      binding: true
      note: Guard height keeps the floor gap clear in the drawing package.
      plan_ref: plan.md#assembly-strategy
    - dimension_id: d_side_left_start_deck_height
      kind: linear
      target: left_start_deck
      value: 70.0
      tolerance: nominal
      binding: true
      note: Start deck height defines the launch-side datum.
      plan_ref: plan.md#assembly-strategy
  notes: []
totals:
  estimated_unit_cost_usd: 67.0
  estimated_weight_g: 1540.0
  estimate_confidence: high
dfm_suggestions:
- Keep the start and goal decks static and planar so the benchmark remains easy to read.
- Treat the floor guard as a read-only clearance reference rather than an engineer-owned feature.
