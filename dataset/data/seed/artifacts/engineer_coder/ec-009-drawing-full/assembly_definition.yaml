drafting:
  sheet_id: sheet_1
  title: Narrow goal funnel technical drawing
  units: mm
  projection_standard: orthographic
  views:
  - view_id: front_funnel_overview
    target: funnel_base
    projection: front
    scale: 1.0
    datums: [A, B]
    dimensions:
    - dimension_id: d_front_base_length
      kind: linear
      target: funnel_base
      value: 720.0
      tolerance: nominal
      binding: true
      note: Funnel base spans the full capture footprint.
      plan_ref: plan.md#parts-list
    - dimension_id: d_front_entry_width
      kind: linear
      target: wide_entry
      value: 170.0
      tolerance: nominal
      binding: true
      note: Wide entry mouth covers the spawn jitter envelope.
      plan_ref: plan.md#assembly-strategy
  - view_id: top_taper_path
    target: taper_left
    projection: top
    scale: 1.0
    datums: [A, C]
    dimensions:
    - dimension_id: d_top_taper_left_length
      kind: linear
      target: taper_left
      value: 470.0
      tolerance: nominal
      binding: true
      note: Left taper length narrows the flow toward the throat.
      plan_ref: plan.md#assembly-strategy
    - dimension_id: d_top_throat_length
      kind: linear
      target: throat_insert
      value: 120.0
      tolerance: nominal
      binding: true
      note: Throat insert sets the narrow goal width.
      plan_ref: plan.md#parts-list
  - view_id: side_goal_capture
    target: goal_pocket
    projection: side
    scale: 1.0
    datums: [B, C]
    dimensions:
    - dimension_id: d_side_goal_pocket_height
      kind: linear
      target: goal_pocket
      value: 28.0
      tolerance: nominal
      binding: true
      note: Goal pocket depth retains the ball after entry.
      plan_ref: plan.md#parts-list
    - dimension_id: d_side_base_thickness
      kind: linear
      target: funnel_base
      value: 10.0
      tolerance: nominal
      binding: true
      note: Base plate thickness provides a stiff mounting surface.
      plan_ref: plan.md#assembly-strategy
  notes: []
totals:
  estimated_unit_cost_usd: 46.25
