drafting:
  sheet_id: sheet_1
  title: Low-friction cube passive chute
  units: mm
  projection_standard: orthographic
  views:
  - view_id: top_route_overview
    target: slide_base
    projection: top
    scale: 1.0
    datums: [A, B]
    dimensions:
    - dimension_id: d_base_length
      kind: linear
      target: slide_base
      value: 620.0
      tolerance: nominal
      binding: true
      note: Base length spans the routed corridor around the center block.
    - dimension_id: d_base_width
      kind: linear
      target: slide_base
      value: 140.0
      tolerance: nominal
      binding: true
      note: Base width keeps the chute inside the build zone.
  - view_id: front_entry
    target: entry_box
    projection: front
    scale: 1.0
    datums: [A, C]
    dimensions:
    - dimension_id: d_entry_width
      kind: linear
      target: entry_box
      value: 160.0
      tolerance: nominal
      binding: true
      note: Entry width covers the spawn jitter band for the slider_cube.
    - dimension_id: d_entry_height
      kind: linear
      target: entry_box
      value: 38.0
      tolerance: nominal
      binding: true
      note: Entry height gives the cube enough vertical margin.
  - view_id: side_goal
    target: goal_pocket
    projection: side
    scale: 1.0
    datums: [B, C]
    dimensions:
    - dimension_id: d_pocket_height
      kind: linear
      target: goal_pocket
      value: 32.0
      tolerance: nominal
      binding: true
      note: Goal pocket height retains the cube in the goal zone.
    - dimension_id: d_pocket_depth
      kind: linear
      target: goal_pocket
      value: 110.0
      tolerance: nominal
      binding: true
      note: Goal pocket depth overlaps the seeded goal volume.
  notes:
  - note_id: note_bypass
    text: "`blocker_bypass_panel` shields the route around `center_collision_block`."
  - note_id: note_walls
    text: "Guide walls keep the low-friction cube on the passive path."
