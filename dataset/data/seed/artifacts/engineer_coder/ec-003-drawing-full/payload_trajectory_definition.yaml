backend: GENESIS
moving_part_names:
- timed_metering_stage
initial_pose:
  reference_point: build_zone_start
  pos_mm: [-92.0, -68.0, 35.0]
  rot_deg: [0.0, 0.0, 0.0]
sample_stride_s: 0.2
anchors:
- t_s: 0.0
  reference_point: build_zone_start
  pos_mm: [-92.0, -68.0, 35.0]
  rot_deg: [0.0, 0.0, 0.0]
  position_tolerance_mm: [0.4, 0.4, 0.4]
  rotation_tolerance_deg: [0.1, 0.1, 1.5]
  build_zone_valid: true
- t_s: 0.8
  reference_point: gate_window_pass
  pos_mm: [115.0, 0.0, 48.0]
  rot_deg: [0.0, 0.0, 12.0]
  position_tolerance_mm: [0.4, 0.4, 0.4]
  rotation_tolerance_deg: [0.1, 0.1, 1.5]
  first_contacts:
  - order: 1
    surface: gate_housing
    first_touch_window_s: [0.7, 0.9]
- t_s: 1.6
  reference_point: goal_zone_entry
  pos_mm: [308.0, 26.0, 61.0]
  rot_deg: [0.0, 0.0, 16.0]
  position_tolerance_mm: [0.4, 0.4, 0.4]
  rotation_tolerance_deg: [0.1, 0.1, 1.5]
terminal_event:
  kind: goal_zone_contact
  t_s: 1.9
  reference_point: goal_zone_contact
  pos_mm: [335.0, 30.0, 65.0]
  contact_surfaces:
  - goal_zone_floor
  zone_name: goal_zone
