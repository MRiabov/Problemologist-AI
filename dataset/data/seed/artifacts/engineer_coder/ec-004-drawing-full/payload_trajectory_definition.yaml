backend: GENESIS
moving_part_names:
  - lift_base
initial_pose:
  reference_point: shelf_lift_tray_tip
  pos_mm: [0.0, 0.0, 20.0]
  rot_deg: [0.0, 0.0, 0.0]
sample_stride_s: 0.3
anchors:
  - t_s: 0.0
    reference_point: shelf_lift_tray_tip
    pos_mm: [0.0, 0.0, 20.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
    first_contacts:
      - order: 1
        surface: belt_bed
        first_touch_window_s: [0.0, 0.3]
    build_zone_valid: true
  - t_s: 0.5
    reference_point: shelf_lift_tray_tip
    pos_mm: [60.0, 0.0, 60.0]
    rot_deg: [0.0, 0.0, 10.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
  - t_s: 1.0
    reference_point: shelf_lift_tray_tip
    pos_mm: [120.0, 0.0, 100.0]
    rot_deg: [0.0, 0.0, 20.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
  - t_s: 1.5
    reference_point: shelf_lift_tray_tip
    pos_mm: [180.0, 0.0, 140.0]
    rot_deg: [0.0, 0.0, 30.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
    first_contacts:
      - order: 1
        surface: upper_tray
        first_touch_window_s: [1.1, 1.9]
  - t_s: 2.0
    reference_point: shelf_lift_tray_tip
    pos_mm: [240.0, 0.0, 170.0]
    rot_deg: [0.0, 0.0, 45.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
  - t_s: 2.5
    reference_point: shelf_lift_tray_tip
    pos_mm: [310.0, 0.0, 205.0]
    rot_deg: [0.0, 0.0, 65.0]
    position_tolerance_mm: [0.6, 0.6, 0.6]
    rotation_tolerance_deg: [0.1, 0.1, 2.0]
terminal_event:
  kind: goal_zone_contact
  t_s: 3.0
  reference_point: shelf_lift_tray_tip
  pos_mm: [370.0, 0.0, 230.0]
  contact_surfaces:
    - upper_tray
  zone_name: goal_zone
