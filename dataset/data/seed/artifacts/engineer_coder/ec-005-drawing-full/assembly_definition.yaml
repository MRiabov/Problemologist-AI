drafting:
  sheet_id: sheet_1
  title: Central forbid route drafting
  units: mm
  projection_standard: orthographic
  views:
  - view_id: front_route_overview
    target: route_base
    projection: front
    scale: 1.0
    datums: [A, B]
    dimensions:
    - dimension_id: d_front_route_base_length
      kind: linear
      target: route_base
      value: 760.0
      tolerance: nominal
      binding: true
      note: Base length spans the routed corridor.
    - dimension_id: d_front_entry_catcher_height
      kind: linear
      target: entry_catcher
      value: 35.0
      tolerance: nominal
      binding: true
      note: Capture height gives the inlet enough vertical margin.
  - view_id: top_route_path
    target: outer_rail
    projection: top
    scale: 1.0
    datums: [A, C]
    dimensions:
    - dimension_id: d_top_outer_rail_length
      kind: linear
      target: outer_rail
      value: 560.0
      tolerance: nominal
      binding: true
      note: Outer rail length marks the long passive turn.
    - dimension_id: d_top_inner_rail_length
      kind: linear
      target: inner_rail
      value: 520.0
      tolerance: nominal
      binding: true
      note: Inner rail length keeps the ball away from the blocker corner.
  - view_id: side_goal_capture
    target: goal_tray
    projection: side
    scale: 1.0
    datums: [B, C]
    dimensions:
    - dimension_id: d_side_goal_tray_height
      kind: linear
      target: goal_tray
      value: 35.0
      tolerance: nominal
      binding: true
      note: Goal tray height damps the final approach.
    - dimension_id: d_side_blocker_skirt_height
      kind: linear
      target: blocker_skirt
      value: 60.0
      tolerance: nominal
      binding: true
      note: Blocker skirt height shields the turn corner.
  notes: []
