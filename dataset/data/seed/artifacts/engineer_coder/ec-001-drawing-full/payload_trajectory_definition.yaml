backend: GENESIS
moving_part_names:
  - payload_ball
initial_pose:
  reference_point: com
  pos_mm: [0.0, -750.0, 1500.0]
  rot_deg: [0.0, 0.0, 0.0]
sample_stride_s: 0.3
anchors:
  - t_s: 0.0
    reference_point: com
    pos_mm: [0.0, -750.0, 1500.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    build_zone_valid: true
    first_contacts:
      - order: 1
        surface: gravity_ramp_top
        first_touch_window_s: [0.0, 0.1]
  - t_s: 0.3
    reference_point: com
    pos_mm: [0.0, -600.0, 1380.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 0.6
    reference_point: com
    pos_mm: [0.0, -450.0, 1260.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 0.9
    reference_point: com
    pos_mm: [0.0, -300.0, 1080.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 1.2
    reference_point: com
    pos_mm: [0.0, -150.0, 900.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 1.5
    reference_point: com
    pos_mm: [0.0, 0.0, 600.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 1.8
    reference_point: com
    pos_mm: [0.0, 250.0, 400.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 2.1
    reference_point: com
    pos_mm: [0.0, 500.0, 280.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts: []
  - t_s: 2.4
    reference_point: com
    pos_mm: [0.0, 650.0, 200.0]
    rot_deg: [0.0, 0.0, 0.0]
    position_tolerance_mm: [10.0, 10.0, 10.0]
    rotation_tolerance_deg: [3.0, 3.0, 3.0]
    first_contacts:
      - order: 1
        surface: goal_zone_entry
        first_touch_window_s: [2.3, 2.5]
terminal_event:
  kind: goal_zone_contact
  t_s: 2.7
  reference_point: com
  pos_mm: [0.0, 800.0, 150.0]
  contact_surfaces:
    - gravity_ramp_exit
  zone_name: goal_zone
