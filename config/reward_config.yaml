# Reward configuration for DSPy optimization metric (cad_simulation_metric).
#
# Design principles:
#   1. Never return 0.0 — even a tiny signal helps the optimizer distinguish
#      between "completely broken" and "almost working".
#   2. Simulation success is the dominant reward term (largest weight).
#   3. Validation gates give partial credit proportional to how far the agent got.
#   4. Price/weight overages are penalised continuously, not zeroed out.
#   5. Weights within each agent sum to 1.0 across hard_checks,
#      judge_evaluation, and any remaining milestones.
#   6. hard_checks are deterministic/objective gates; judge_evaluation carries
#      reviewer and LLM-as-a-judge signals with partial credit where available.
#
# Usage:
#   from controller.agent.reward import load_reward_config
#   cfg = load_reward_config()  # returns RewardConfig pydantic model
#
# Optimizer bootstrap threshold: only traces scoring >= bootstrap_threshold
# are used as few-shot examples (keeps examples high-quality).

bootstrap_threshold: 0.75

# ---------------------------------------------------------------------------
# Benchmark Generator graph
# ---------------------------------------------------------------------------
benchmark:
  # ── Benchmark Planner ────────────────────────────────────────────────────
  benchmark_planner:
    description: >
      Scores the planner's ability to produce a valid, well-structured benchmark
      plan with correct cost/weight caps and a feasible environment geometry.
    hard_checks:
      # Gate 1 — plan artifacts exist and are non-empty
      plan_artifacts_present:
        weight: 0.05
        description: >
          plan.md, benchmark_definition.yaml, benchmark_assembly_definition.yaml, and todo.md all
          exist and are non-empty (not equal to template stubs).

      # Gate 2 — YAML files pass schema validation
      yaml_schema_valid:
        weight: 0.10
        description: >
          benchmark_definition.yaml and benchmark_assembly_definition.yaml pass Pydantic schema
          validation (no missing required fields, correct types, valid units).

      # Gate 3 — cost estimate within benchmark cap
      cost_within_cap:
        weight: 0.10
        description: >
          Planner-estimated assembly cost <= benchmark max_unit_cost.
          Partial credit: max(0, 1 - max(0, ratio - 1)) where ratio =
          estimated_cost / max_unit_cost. E.g. 20% over → 0.80 partial.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, estimated_cost / max_unit_cost - 1.0))"

      # Gate 4 — weight estimate within cap
      weight_within_cap:
        weight: 0.05
        description: >
          Planner-estimated weight <= max_weight_g. Same continuous penalty as cost.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, estimated_weight / max_weight_g - 1.0))"

      # Gate 5 — environment geometry is self-consistent
      geometry_consistent:
        weight: 0.10
        description: >
          build_zone, goal_zone, forbid_zones, and simulation_bounds are
          non-overlapping (goal ∩ forbid = ∅, build_zone ⊂ sim_bounds).
          Binary: either consistent or not.

      # Gate 6 — COTS parts referenced with valid catalog IDs
      cots_ids_valid:
        weight: 0.05
        description: >
          All COTS part IDs in benchmark_assembly_definition.yaml resolve to known
          entries in the parts catalog DB.

    judge_evaluation:
      # Judge 1 — plan passes reviewer acceptance
      reviewer_accepted:
        weight: 0.10
        description: >
          The benchmark plan reviewer accepted the handoff without requesting
          a re-plan.
      checklist:
        artifacts_complete:
          weight: 0.03
          description: >
            Planner handoff artifacts are complete enough for benchmark plan review.
        cross_artifact_consistency:
          weight: 0.07
          description: >
            Benchmark objects, zones, and motion references are consistent across planner artifacts.
        geometry_feasible:
          weight: 0.06
          description: >
            Planned benchmark geometry is physically and spatially feasible.
        objective_clearance_valid:
          weight: 0.04
          description: >
            Goal/forbid/objective clearances are valid for the intended task.
        randomization_valid:
          weight: 0.04
          description: >
            Static and runtime randomization remain in bounds and reviewable.
        motion_contract_complete:
          weight: 0.02
          description: >
            Moving benchmark fixtures expose complete motion metadata for engineering intake.
        benchmark_dof_minimality:
          weight: 0.02
          description: >
            Benchmark-side degrees of freedom are minimal and puzzle-justified.
        ambiguity_free:
          weight: 0.02
          description: >
            Planner handoff is sufficiently specific and free of ambiguity.
      feedback_response_score:
        weight: 0.15
        description: >
          Fraction of valid failed reviewer checklist items addressed on the
          next planner revision without introducing new blocker regressions.
        partial: true

  # ── Benchmark CAD Engineer ───────────────────────────────────────────────
  benchmark_coder:
    description: >
      Scores the CAD engineer's ability to implement a valid, compilable, and
      physically stable benchmark environment.
    hard_checks:
      # Gate 1 — script compiles without errors
      script_compiles:
        weight: 0.08
        description: >
          script.py executes without Python syntax or import errors.
          Minimum signal: even a non-compiling attempt gets 0.02 to distinguish
          from a missing file.
        minimum_score: 0.02
        success_feedback: "The benchmark script compiled and executed without syntax or import errors."
        failure_feedback: "The benchmark script failed to compile or encountered a runtime error."

      # Gate 2 — build123d CAD is geometrically valid
      cad_geometry_valid:
        weight: 0.12
        description: >
          All parts export to valid OBJ meshes (no degenerate faces,
          no self-intersections detected by trimesh).
        success_feedback: "Benchmark geometry is valid and exported successfully."
        failure_feedback: "Benchmark geometry is invalid or failed to export (e.g. degenerate faces)."

      # Gate 3 — benchmark constraints satisfied (no zone overlaps)
      benchmark_constraints_satisfied:
        weight: 0.10
        description: >
          validate() passes: input object ∩ environment = ∅, goal ∩ forbid = ∅,
          all objects within simulation_bounds under all static randomization variants.
        success_feedback: "Benchmark constraints (zone overlaps) are satisfied."
        failure_feedback: "Benchmark constraints violated: environment overlaps with goal or forbid zones."

      # Gate 4 — simulation runs without instability
      simulation_stable:
        weight: 0.15
        description: >
          A short smoke-test simulation (5 frames) completes without NaNs,
          penetration explosions, or out-of-bounds exits.
        success_feedback: "Benchmark simulation environment is physically stable."
        failure_feedback: "Benchmark simulation is unstable (NaNs or explosions detected)."

    judge_evaluation:
      # Judge 1 — reviewer accepted the benchmark
      reviewer_accepted:
        weight: 0.10
        description: >
          The benchmark reviewer accepted the implementation.
        success_feedback: "Benchmark implementation was accepted by the reviewer."
        failure_feedback: "Benchmark implementation was rejected by the reviewer."
      checklist:
        latest_revision_verified:
          weight: 0.03
          description: >
            Reviewer checked the latest implementation revision rather than stale output.
        validation_success:
          weight: 0.04
          description: >
            Validation success was correctly checked before benchmark approval.
        simulation_success:
          weight: 0.05
          description: >
            Simulation success was correctly checked before benchmark approval.
        visual_evidence_checked:
          weight: 0.02
          description: >
            Static visual evidence was inspected when available.
        dynamic_evidence_checked:
          weight: 0.03
          description: >
            Dynamic evidence was inspected for moving or powered benchmark fixtures.
        plan_fidelity:
          weight: 0.05
          description: >
            Implementation follows the approved benchmark plan or clearly justified deltas.
        robustness:
          weight: 0.04
          description: >
            Implementation is robust rather than seed-fragile.
        constraint_compliance:
          weight: 0.02
          description: >
            Benchmark environment remains within declared geometric and task constraints.
        benchmark_motion_justified:
          weight: 0.02
          description: >
            Benchmark-owned motion stays reviewable and appropriately constrained.
      feedback_response_score:
        weight: 0.15
        description: >
          Fraction of valid failed reviewer checklist items addressed on the
          next coding revision without introducing new blocker regressions.
        partial: true

  # ── Benchmark Plan Reviewer ──────────────────────────────────────────────
  benchmark_plan_reviewer:
    description: >
      Scores the benchmark plan reviewer's decision quality. Reward is based on
      contract-complete review output plus rubric-aligned checklist judgment.
    hard_checks:
      review_artifacts_complete:
        weight: 0.10
        description: >
          reviews/ contains the stage-specific benchmark-plan decision YAML and
          comments/checklist YAML for the current round.
    judge_evaluation:
      decision_correct:
        weight: 0.35
        description: >
          The plan decision matches seeded ground truth for accept/reject.
      checklist:
        artifacts_complete:
          weight: 0.04
          description: >
            Reviewer correctly judged planner artifact completeness.
        cross_artifact_consistency:
          weight: 0.08
          description: >
            Reviewer correctly judged cross-artifact benchmark consistency.
        geometry_feasible:
          weight: 0.07
          description: >
            Reviewer correctly judged benchmark geometry feasibility.
        objective_clearance_valid:
          weight: 0.05
          description: >
            Reviewer correctly judged goal/forbid/objective clearance validity.
        randomization_valid:
          weight: 0.04
          description: >
            Reviewer correctly judged randomization bounds and sanity.
        motion_contract_complete:
          weight: 0.03
          description: >
            Reviewer correctly judged moving-fixture motion contract completeness.
        benchmark_dof_minimality:
          weight: 0.02
          description: >
            Reviewer correctly judged benchmark-side DOF minimality.
        ambiguity_free:
          weight: 0.02
          description: >
            Reviewer correctly judged whether the plan package was ambiguity-free.
      review_actionable:
        weight: 0.20
        description: >
          Rejections include concrete fixes aligned with the failed checklist
          items. Acceptances receive full credit.
        success_feedback: "Benchmark plan review was actionable."
        failure_feedback: "Benchmark plan review lacked actionable fixes."

  # ── Benchmark Reviewer ───────────────────────────────────────────────────
  benchmark_reviewer:
    description: >
      Scores the reviewer's decision quality. A reviewer is rewarded for
      correctly accepting solvable benchmarks and correctly rejecting broken ones.
      Evaluated post-hoc against engineer solve rate.
    hard_checks:
      # Gate 1 — review artifacts are complete
      review_artifacts_complete:
        weight: 0.10
        description: >
          reviews/ directory contains the stage-specific benchmark-execution
          decision YAML and comments/checklist YAML for the current round.
    judge_evaluation:
      # Judge 1 — decision is consistent with downstream engineer outcome
      # (post-hoc; computed after engineer attempts the benchmark)
      decision_correct:
        weight: 0.35
        description: >
          Accepted benchmarks are solvable by the engineer (true positive).
          Rejected benchmarks were genuinely broken (true negative).
      checklist:
        latest_revision_verified:
          weight: 0.03
          description: >
            Reviewer correctly judged that the latest revision was reviewed.
        validation_success:
          weight: 0.05
          description: >
            Reviewer correctly judged validation status.
        simulation_success:
          weight: 0.05
          description: >
            Reviewer correctly judged simulation success status.
        visual_evidence_checked:
          weight: 0.03
          description: >
            Reviewer correctly judged whether visual evidence inspection was completed.
        dynamic_evidence_checked:
          weight: 0.04
          description: >
            Reviewer correctly judged whether dynamic evidence was required and inspected.
        plan_fidelity:
          weight: 0.05
          description: >
            Reviewer correctly judged plan-vs-implementation fidelity.
        robustness:
          weight: 0.04
          description: >
            Reviewer correctly judged robustness rather than one-off success.
        constraint_compliance:
          weight: 0.03
          description: >
            Reviewer correctly judged geometric and task-constraint compliance.
        benchmark_motion_justified:
          weight: 0.03
          description: >
            Reviewer correctly judged whether benchmark-side motion remained justified.
      review_actionable:
        weight: 0.20
        description: >
          If rejected: review includes at least one concrete, specific fix
          suggestion referencing a file and line/section. If accepted: N/A
          (full credit awarded automatically).

# ---------------------------------------------------------------------------
# Engineer (problem solver) graph
# ---------------------------------------------------------------------------
engineer:
  # ── Engineering Planner ──────────────────────────────────────────────────
  engineer_planner:
    description: >
      Scores the planner's ability to produce a feasible, cost-compliant
      engineering plan that the CAD engineer can implement.
    hard_checks:
      # Gate 1 — plan artifacts present and non-stub
      plan_artifacts_present:
        weight: 0.05
        description: >
          plan.md (all 5 required sections), todo.md, assembly_definition.yaml
          all exist and are non-empty.

      # Gate 2 — YAML schema valid
      yaml_schema_valid:
        weight: 0.08
        description: >
          assembly_definition.yaml passes Pydantic validation.

      # Gate 3 — cost estimate within cap (continuous penalty)
      cost_within_cap:
        weight: 0.12
        description: >
          Planner-estimated cost <= benchmark_definition.yaml max_unit_cost.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, estimated_cost / max_unit_cost - 1.0))"

      # Gate 4 — weight estimate within cap (continuous penalty)
      weight_within_cap:
        weight: 0.05
        description: >
          Planner-estimated weight <= max_weight_g.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, estimated_weight / max_weight_g - 1.0))"

      # Gate 5 — COTS parts valid
      cots_ids_valid:
        weight: 0.05
        description: >
          All COTS part IDs resolve to catalog entries.

      # Gate 6 — mechanism fits build zone
      mechanism_fits_build_zone:
        weight: 0.10
        description: >
          All parts declared in assembly_definition.yaml fit within the
          build_zone AABB from benchmark_definition.yaml (checked geometrically).

    milestones:
      # Gate 7 — engineer successfully implemented the plan (downstream)
      engineer_implemented_successfully:
        weight: 0.25
        description: >
          The CAD engineer produced a passing simulation based on this plan.
          This measures downstream utility of the plan beyond review acceptance.

    judge_evaluation:
      reviewer_accepted:
        weight: 0.10
        description: >
          The engineering plan reviewer accepted the handoff without requesting
          planner changes.
      checklist:
        artifacts_complete:
          weight: 0.01
          description: >
            Planner handoff artifacts are complete enough for engineering plan review.
        cross_artifact_consistency:
          weight: 0.03
          description: >
            Plan, benchmark, and assembly artifacts stay mutually consistent.
        feasible_mechanism:
          weight: 0.03
          description: >
            Planned mechanism is physically feasible and solveable.
        budget_realism:
          weight: 0.03
          description: >
            Plan uses realistic budget assumptions and cost estimates.
        build_zone_fit:
          weight: 0.02
          description: >
            Planned mechanism fits the benchmark build zone.
        cots_valid:
          weight: 0.01
          description: >
            Planned COTS selections are valid and properly identified.
        dof_minimality:
          weight: 0.01
          description: >
            Proposed motion complexity is minimal and mechanism-justified.
        ambiguity_free:
          weight: 0.01
          description: >
            Engineering plan is specific enough for implementation handoff.
      feedback_response_score:
        weight: 0.05
        description: >
          Fraction of valid failed reviewer checklist items addressed on the
          next planner revision without introducing new blocker regressions.
        partial: true

  # ── CAD Engineer (Mechanical Implementer) ────────────────────────────────
  engineer_coder:
    description: >
      Scores the CAD engineer's ability to produce a manufacturable,
      cost-compliant solution that passes simulation.
    hard_checks:
      # Gate 1 — script compiles
      script_compiles:
        weight: 0.05
        description: >
          script.py executes without Python syntax or import errors.
        minimum_score: 0.02
        success_feedback: "The CAD script compiled and executed without syntax or import errors."
        failure_feedback: "The CAD script failed to compile or encountered a runtime error. Check for syntax errors or missing imports."

      # Gate 2 — CAD geometry valid (no self-intersections, valid mesh)
      cad_geometry_valid:
        weight: 0.08
        description: >
          All parts export to valid OBJ meshes.
        success_feedback: "CAD geometry is valid and successfully exported."
        failure_feedback: "CAD geometry is invalid, has self-intersections, or failed to export."

      # Gate 3 — manufacturability passes
      manufacturability_valid:
        weight: 0.07
        description: >
          All parts pass workbench manufacturability checks (e.g. no CNC
          undercuts, wall thickness >= minimum for injection molding).
        success_feedback: "The design passed all manufacturability constraints (CNC/Injection Molding)."
        failure_feedback: "The design has manufacturability issues (e.g. undercuts, thin walls). Review manufacturing constraints."

      # Gate 4 — parts within build zone
      parts_within_build_zone:
        weight: 0.05
        description: >
          All custom-built parts are fully within the build_zone AABB.
        success_feedback: "All parts are correctly positioned within the designated build zone."
        failure_feedback: "Some parts are outside the build zone. Adjust part placement or scaling."

      # Gate 5 — actual cost within cap (continuous penalty)
      cost_within_cap:
        weight: 0.10
        description: >
          Validated unit cost (from validate_and_price) <= max_unit_cost.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, actual_cost / max_unit_cost - 1.0))"
        success_feedback: "Manufacturing cost is within the target budget."
        failure_feedback: "Manufacturing cost exceeds the budget. Try using cheaper materials or reducing part volume."

      # Gate 6 — actual weight within cap (continuous penalty)
      weight_within_cap:
        weight: 0.05
        description: >
          Validated assembly weight <= max_weight_g.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, actual_weight / max_weight_g - 1.0))"
        success_feedback: "Assembly weight is within the maximum limit."
        failure_feedback: "Assembly weight exceeds the limit. Use lighter materials or hollow out solid regions."

    milestones:
      # Gate 7 — simulation result (dominant term)
      simulation_result:
        weight: 0.45
        description: >
          Simulation outcome. Full credit for success. Partial credit for
          failure proportional to progress toward goal:
            partial_score = 1.0 - (min_distance_achieved / initial_distance)
          Partial credit is discounted by 0.4 to incentivise full success:
            score = 0.45 * partial_score * 0.4  (if failed)
            score = 0.45                         (if success)
        partial: true
        success_formula: "0.45"
        failure_formula: "0.45 * (1.0 - min_distance_achieved / initial_distance) * 0.4"
        success_feedback: "The solution successfully solved the problem in simulation."
        failure_feedback: "The simulation failed to reach the goal. Re-examine mechanical stability, component placement, or movement range."

    judge_evaluation:
      reviewer_accepted:
        weight: 0.02
        description: >
          The execution reviewer accepted the implementation.
      checklist:
        latest_revision_verified:
          weight: 0.005
          description: >
            Latest implementation revision was the one evaluated for submission.
        validation_success:
          weight: 0.01
          description: >
            Validation success is satisfied at review time.
        simulation_success:
          weight: 0.015
          description: >
            Simulation success is satisfied at review time.
        visual_evidence_checked:
          weight: 0.005
          description: >
            Required static evidence has been inspected.
        dynamic_evidence_checked:
          weight: 0.005
          description: >
            Required dynamic evidence has been inspected.
        plan_fidelity:
          weight: 0.01
          description: >
            Implementation stays aligned with the approved plan.
        robustness:
          weight: 0.01
          description: >
            Solution is robust rather than passing a single lucky run.
        cost_weight_compliance:
          weight: 0.005
          description: >
            Final solution stays within cost and weight targets.
        manufacturability_compliance:
          weight: 0.01
          description: >
            Final solution remains manufacturable under the chosen process.
        dof_deviation_justified:
          weight: 0.005
          description: >
            Any DOF deviation from the approved plan is justified and reviewable.
      feedback_response_score:
        weight: 0.03
        description: >
          Fraction of valid failed reviewer checklist items addressed on the
          next coding revision without introducing new blocker regressions.
        partial: true
      bad_feedback_resistance_score:
        weight: 0.02
        description: >
          Score for following valid reviewer feedback while resisting incorrect
          or non-applicable requests in mixed-quality review seeds.
        partial: true

  # ── Electrical Engineer ──────────────────────────────────────────────────
  electronics_engineer:
    description: >
      Scores the electrical engineer's ability to design a valid, functional
      electrical subsystem (wiring, power budget, continuity).
    milestones:
      # Gate 1 — electrical schematic file present
      schematic_present:
        weight: 0.10
        description: >
          electrical_schematic.yaml or equivalent artifact exists and is non-empty.

      # Gate 2 — power budget within cap
      power_budget_valid:
        weight: 0.15
        description: >
          Total power draw <= power_budget from benchmark_definition.yaml.
        partial: true
        penalty_formula: "max(0.0, 1.0 - max(0.0, total_power / max_power - 1.0))"

      # Gate 3 — circuit continuity check passes
      circuit_continuity:
        weight: 0.20
        description: >
          All actuators and sensors are reachable from the power source
          (graph connectivity check on the schematic).

      # Gate 4 — simulation with electrical subsystem passes
      simulation_result:
        weight: 0.55
        description: >
          Full simulation (mechanical + electrical) passes. Same partial
          credit formula as engineer_coder.simulation_result.
        partial: true
        success_formula: "0.55"
        failure_formula: "0.55 * (1.0 - min_distance_achieved / initial_distance) * 0.4"

  # ── Engineering Plan Reviewer ────────────────────────────────────────────
  engineer_plan_reviewer:
    description: >
      Scores the engineering plan reviewer's decision quality. Reward is based
      on complete review artifacts plus rubric-aligned checklist judgment.
    hard_checks:
      review_artifacts_complete:
        weight: 0.10
        description: >
          reviews/ contains the stage-specific engineering-plan decision YAML
          and comments/checklist YAML for the current round.
    judge_evaluation:
      decision_correct:
        weight: 0.35
        description: >
          The plan decision matches seeded ground truth for accept/reject.
      checklist:
        artifacts_complete:
          weight: 0.03
          description: >
            Reviewer correctly judged planner artifact completeness.
        cross_artifact_consistency:
          weight: 0.06
          description: >
            Reviewer correctly judged consistency across plan, benchmark, and assembly artifacts.
        feasible_mechanism:
          weight: 0.06
          description: >
            Reviewer correctly judged mechanism feasibility.
        budget_realism:
          weight: 0.06
          description: >
            Reviewer correctly judged cost and weight realism.
        build_zone_fit:
          weight: 0.04
          description: >
            Reviewer correctly judged build-zone fit.
        cots_valid:
          weight: 0.03
          description: >
            Reviewer correctly judged COTS validity and specificity.
        dof_minimality:
          weight: 0.04
          description: >
            Reviewer correctly judged whether the mechanism used minimal justified DOFs.
        ambiguity_free:
          weight: 0.03
          description: >
            Reviewer correctly judged whether the plan was implementation-ready and unambiguous.
      review_actionable:
        weight: 0.20
        description: >
          Rejections include specific fixes aligned with the failed checklist
          items. Acceptances receive full credit.

  # ── Electronics Reviewer ─────────────────────────────────────────────────
  electronics_reviewer:
    description: >
      Scores the electronics reviewer's decision quality over electrical or
      electromechanical implementation output.
    hard_checks:
      review_artifacts_complete:
        weight: 0.10
        description: >
          reviews/ contains the stage-specific electronics decision YAML and
          comments/checklist YAML for the current round.
    judge_evaluation:
      decision_correct:
        weight: 0.35
        description: >
          The electrical review decision matches seeded ground truth for
          accept/reject.
      checklist:
        latest_revision_verified:
          weight: 0.04
          description: >
            Reviewer correctly judged that the latest electrical revision was reviewed.
        schematic_present:
          weight: 0.05
          description: >
            Reviewer correctly judged presence and completeness of electrical schematic artifacts.
        power_budget_valid:
          weight: 0.06
          description: >
            Reviewer correctly judged power-budget compliance.
        circuit_continuity:
          weight: 0.06
          description: >
            Reviewer correctly judged continuity and circuit validity.
        electromechanical_clearance:
          weight: 0.05
          description: >
            Reviewer correctly judged electrical routing and electromechanical clearance.
        plan_fidelity:
          weight: 0.04
          description: >
            Reviewer correctly judged fidelity to the approved electromechanical plan.
        visual_evidence_checked:
          weight: 0.02
          description: >
            Reviewer correctly judged static evidence inspection requirements.
        dynamic_evidence_checked:
          weight: 0.03
          description: >
            Reviewer correctly judged dynamic electrical evidence inspection requirements.
      review_actionable:
        weight: 0.20
        description: >
          Rejections include specific fixes aligned with the failed checklist
          items. Acceptances receive full credit.

  # ── Engineering Execution Reviewer ───────────────────────────────────────
  engineer_execution_reviewer:
    description: >
      Scores the reviewer's decision quality. Rewarded for correctly
      accepting working solutions and correctly rejecting broken ones.
    hard_checks:
      # Gate 1 — review artifacts complete
      review_artifacts_complete:
        weight: 0.10
        description: >
          reviews/ contains the stage-specific engineering-execution decision
          YAML and comments/checklist YAML for the current round.
    judge_evaluation:
      # Judge 1 — decision correctness (post-hoc)
      decision_correct:
        weight: 0.35
        description: >
          Accepted solutions pass re-simulation. Rejected solutions were
          genuinely broken (verified by re-run).
      checklist:
        latest_revision_verified:
          weight: 0.02
          description: >
            Reviewer correctly judged whether the latest revision was reviewed.
        validation_success:
          weight: 0.03
          description: >
            Reviewer correctly judged validation success.
        simulation_success:
          weight: 0.04
          description: >
            Reviewer correctly judged simulation success.
        visual_evidence_checked:
          weight: 0.02
          description: >
            Reviewer correctly judged static evidence inspection.
        dynamic_evidence_checked:
          weight: 0.02
          description: >
            Reviewer correctly judged dynamic evidence inspection.
        plan_fidelity:
          weight: 0.05
          description: >
            Reviewer correctly judged plan fidelity.
        robustness:
          weight: 0.06
          description: >
            Reviewer correctly judged robustness rather than one-off success.
        cost_weight_compliance:
          weight: 0.03
          description: >
            Reviewer correctly judged cost and weight compliance.
        manufacturability_compliance:
          weight: 0.03
          description: >
            Reviewer correctly judged manufacturability compliance.
        dof_deviation_justified:
          weight: 0.05
          description: >
            Reviewer correctly judged whether DOF deviations were justified.
      review_actionable:
        weight: 0.20
        description: >
          Rejections include specific, file-referenced fix suggestions.
          Acceptances: full credit automatically.

# ---------------------------------------------------------------------------
# Shared subagents
# ---------------------------------------------------------------------------
shared:
  # ── COTS Search Subagent ─────────────────────────────────────────────────
  cots_search:
    description: >
      Scores the COTS search subagent's ability to return relevant,
      constraint-satisfying part candidates efficiently.
    milestones:
      # Gate 1 — returned candidates within constraints
      candidates_within_constraints:
        weight: 0.40
        description: >
          All returned candidates satisfy the invoker's constraints
          (torque, voltage, size, cost tier). Partial: fraction of
          candidates that satisfy all constraints.
        partial: true
        formula: "n_valid_candidates / n_returned_candidates"

      # Gate 2 — at least one candidate was used in the final plan
      candidate_adopted:
        weight: 0.40
        description: >
          At least one returned part_id appears in the final
          assembly_definition.yaml. Binary.

      # Gate 3 — search was efficient (few queries)
      search_efficiency:
        weight: 0.20
        description: >
          Fewer SQL queries to find a valid candidate is better.
          Score = max(0, 1 - (n_queries - 1) / 5). 1 query → 1.0,
          6+ queries → 0.0.
        partial: true
        formula: "max(0.0, 1.0 - (n_queries - 1) / 5.0)"

  # ── Skill Creator Subagent ───────────────────────────────────────────────
  skill_agent:
    description: >
      Scores the skill creator's ability to produce reusable, correct skills
      that improve downstream agent performance.
    milestones:
      # Gate 1 — skill file is valid markdown with required sections
      skill_file_valid:
        weight: 0.15
        description: >
          SKILL.md contains required YAML frontmatter (name, description)
          and at least one instruction section.

      # Gate 2 — skill is adopted (read by at least one subsequent agent)
      skill_adopted:
        weight: 0.35
        description: >
          The skill file is read (skill_file_read event) by at least one
          subsequent agent run within the same episode.

      # Gate 3 — skill improves downstream success rate (post-hoc)
      skill_improves_success:
        weight: 0.50
        description: >
          Episodes that read this skill have a higher simulation_result score
          than the baseline (computed over a rolling window of 10 episodes).
          Partial: delta_score / 0.10 clamped to [0, 1]. A 10% improvement
          → full credit.
        partial: true
        formula: "min(1.0, delta_success_rate / 0.10)"
