    - inspect_media
    - write_file
    - grep
    - execute_command
    - inspect_topology
    - invoke_cots_search_subagent
    allowed_during_unit_eval:
    - engineer_coder
    - engineer_execution_reviewer
    visual_inspection:
      required: true
