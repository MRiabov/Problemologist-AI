        - '**/*.py'
        - simulation_result.json
        - validation_results.json
        - workbench_report.md
        - renders/**
        - journal.md
        deny:
        - .manifests/**
      write:
        allow:
        - reviews/engineering-execution-review-decision-round-*.yaml
        - reviews/engineering-execution-review-comments-round-*.yaml
        deny:
        - .manifests/**
    tools:
    - list_files
