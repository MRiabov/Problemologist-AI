version: '1.0'
llm:
  max_reasoning_tokens: 16384
  context_compaction_threshold_tokens: 225000
  requests_per_minute: 40
  multimodal_model: null
  reasoning_effort_enabled: true
render:
  image_resolution:
    width: 1024
    height: 768
  video_resolution:
    width: 1280
    height: 960
  split_video_renders_to_images: true
  video_frame_attachment_stride: 6
  video_frame_jpeg_quality_percent: 85
  rgb:
    enabled: true
    axes: true
    edges: true
  depth:
    enabled: true
    axes: true
    edges: true
  segmentation:
    enabled: true
    axes: true
    edges: true
execution:
  defaults:
    timeout_seconds: 300
    max_turns: 150
    max_total_tokens: 400000
    native_tool_loop_max_iters: 8
  agents:
    engineer_planner:
      timeout_seconds: 450
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 48
    engineer_coder:
      timeout_seconds: 1000
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 48
    engineer_plan_reviewer:
      timeout_seconds: 90
      max_turns: 150
      max_total_tokens: 400000
    electronics_planner:
      timeout_seconds: 450
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 48
    electronics_reviewer:
      timeout_seconds: 90
      max_turns: 150
      max_total_tokens: 400000
    engineer_execution_reviewer:
      timeout_seconds: 90
      max_turns: 150
      max_total_tokens: 400000
    benchmark_planner:
      timeout_seconds: 450
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 48
    benchmark_coder:
      timeout_seconds: 450
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 48
    benchmark_reviewer:
      timeout_seconds: 90
      max_turns: 150
      max_total_tokens: 400000
    cots_search:
      timeout_seconds: 180
      max_turns: 150
      max_total_tokens: 400000
      native_tool_loop_max_iters: 16
    journalling_agent:
      timeout_seconds: 90
      max_turns: 150
      max_total_tokens: 400000
    skill_agent:
      timeout_seconds: 120
      max_turns: 150
      max_total_tokens: 400000
defaults:
  reasoning_effort: high
  filesystem_permissions:
    read:
      allow:
      - '**'
      - /
      - .
      deny:
      - .git/**
      - .env
      - '**/secrets/**'
      - .manifests/**
    write:
      allow: []
      deny:
      - '**'
agents:
  engineer_planner:
    drafting_mode: "off"
    reasoning_effort: xhigh
    filesystem_permissions:
      read:
        allow:
        - /
        - .
        - config/**
        - skills/**
        - utils/**
        - manufacturing_config.yaml
        - benchmark_definition.yaml
        - benchmark_assembly_definition.yaml
        - assembly_definition.yaml
        - solution_plan_evidence_script.py
        - solution_plan_technical_drawing_script.py
        - plan.md
        - todo.md
        - journal.md
        - renders/**
        deny:
        - .manifests/**
      write:
        allow:
        - plan.md
        - todo.md
        - journal.md
        - assembly_definition.yaml
        - benchmark_definition.yaml
        - solution_plan_evidence_script.py
        - solution_plan_technical_drawing_script.py
      deny:
        - skills/**
        - utils/**
        - reviews/**
        - benchmark_script.py
        - solution_script.py
        - .manifests/**
    tools:
    - list_files
    - read_file
    - inspect_media
    - preview_drawing
    - write_file
    - edit_file
    - invoke_cots_search_subagent
    - validate_costing_and_price
    - submit_plan
    allowed_during_unit_eval:
    - engineer_planner
    - engineer_plan_reviewer
    visual_inspection:
      required: true
      min_images: 1
      reminder_interval: 2
  engineer_coder:
    reasoning_effort: high
    filesystem_permissions:
      read:
        allow:
        - /
        - .
        - config/**
        - skills/**
        - utils/**
        - plan.md
        - todo.md
        - journal.md
        - benchmark_definition.yaml
        - benchmark_assembly_definition.yaml
        - assembly_definition.yaml
        - benchmark_script.py
        - solution_script.py
        - '**/*.py'
        - reviews/**
        - renders/**
        deny:
        - .manifests/**
      write:
        allow:
        - solution_script.py
        - '**/*.py'
        - todo.md
        - journal.md
        - renders/**
        - plan_refusal.md
        - plan.md
        - assembly_definition.yaml
        deny:
        - skills/**
        - utils/**
        - benchmark_script.py
        - reviews/**/*.py
        - .manifests/**
    tools:
    - list_files
    - read_file
    - inspect_media
    - write_file
    - edit_file
    - grep
    - execute_command
    - inspect_topology
    - invoke_cots_search_subagent
    allowed_during_unit_eval:
    - engineer_coder
    - engineer_execution_reviewer
  benchmark_coder:
    reasoning_effort: high
    filesystem_permissions:
      read:
        allow:
        - /
        - .
        - skills/**
        - utils/**
        - plan.md
        - todo.md
        - journal.md
        - benchmark_definition.yaml
        - benchmark_assembly_definition.yaml
        - benchmark_script.py
        - '**/*.py'
        - plan_refusal.md
        - reviews/**
        - renders/**
        - validation_results.json
        - simulation_result.json
        - scene.json
        - assets/**
        deny:
        - .manifests/**
      write:
        allow:
        - benchmark_script.py
        - '**/*.py'
        - todo.md
        - journal.md
        - renders/**
        - plan_refusal.md
        deny:
        - benchmark_definition.yaml
        - benchmark_assembly_definition.yaml
        - plan.md
        - skills/**
        - utils/**
        - reviews/**
        - .manifests/**
    tools:
    - list_files
    - read_file
    - inspect_media
    - write_file
    - edit_file
    - grep
    - execute_command
    - inspect_topology
    - invoke_cots_search_subagent
    allowed_during_unit_eval:
    - benchmark_coder
    - benchmark_reviewer
    visual_inspection:
      required: false
      min_images: 1
      reminder_interval: 2
  engineer_plan_reviewer:
    reasoning_effort: xhigh
    filesystem_permissions:
      read:
        allow:
        - /
        - .
        - config/**
        - skills/**
        - utils/**
        - plan.md
        - todo.md
        - benchmark_definition.yaml
        - benchmark_assembly_definition.yaml
        - assembly_definition.yaml
        - plan_refusal.md
        - benchmark_script.py
        - solution_script.py
        - '**/*.py'
        - simulation_result.json
        - validation_results.json
        - workbench_report.md
        - renders/**
        - journal.md
        deny:
        - .manifests/**
      write:
        allow:
        - reviews/engineering-plan-review-decision-round-*.yaml
        - reviews/engineering-plan-review-comments-round-*.yaml
        deny:
        - .manifests/**
    tools:
    - list_files
    - read_file
    - inspect_media
    - write_file
    - grep
    - execute_command
    - inspect_topology
    - verify
    - invoke_cots_search_subagent
    allowed_during_unit_eval:
    - engineer_coder
    - engineer_plan_reviewer
    visual_inspection:
      required: true
      min_images: 1
      reminder_interval: 2
  engineer_execution_reviewer:
