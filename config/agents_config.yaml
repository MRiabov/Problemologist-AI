version: "1.0"

llm:
  max_reasoning_tokens: 16384
  context_compaction_threshold_tokens: 225000

defaults:
  read:
    allow: ["**", "/", "."]
    deny: [".git/**", ".env", "**/secrets/**"]
  write:
    allow: []
    deny: ["**"]

agents:
  engineer_planner:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "objectives.yaml", "assembly_definition.yaml", "plan.md", "todo.md", "journal.md"]
      deny: []
    write:
      allow: ["plan.md", "todo.md", "journal.md", "assembly_definition.yaml", "objectives.yaml"]
      deny: ["skills/**", "utils/**", "reviews/**", "renders/**", "script.py", "**/*.py"]

  engineer_coder:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "script.py", "**/*.py", "reviews/**", "renders/**"]
      deny: []
    write:
      allow: ["script.py", "**/*.py", "todo.md", "journal.md", "renders/**", "plan_refusal.md", "plan.md", "objectives.yaml", "assembly_definition.yaml", "reviews/**"]
      deny: ["skills/**", "utils/**", "reviews/**/*.py"]

  electronics_engineer:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "reviews/**", "renders/**"]
      deny: []
    write:
      allow: ["script.py", "**/*.py", "todo.md", "journal.md", "renders/**", "plan_refusal.md", "schematic_*.png", "schematic_*.pdf", "wiring_*.png"]
      deny: ["objectives.yaml", "assembly_definition.yaml", "plan.md", "skills/**", "utils/**", "reviews/**"]

  benchmark_coder:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "script.py", "**/*.py", "reviews/**", "renders/**"]
      deny: []
    write:
      allow: ["script.py", "**/*.py", "todo.md", "journal.md", "renders/**", "plan_refusal.md"]
      deny: ["objectives.yaml", "assembly_definition.yaml", "plan.md", "skills/**", "utils/**", "reviews/**"]

  engineer_reviewer:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "plan_refusal.md", "script.py", "**/*.py", "simulation_result.json", "validation_results.json", "workbench_report.md", "renders/**", "journal.md"]
      deny: []
    write:
      allow: ["reviews/review-round-*/review.md"]
      deny: []

  execution_reviewer:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "plan_refusal.md", "script.py", "**/*.py", "simulation_result.json", "validation_results.json", "workbench_report.md", "renders/**", "journal.md"]
      deny: []
    write:
      allow: ["reviews/review-round-*/review.md"]
      deny: []

  benchmark_planner:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "objectives.yaml", "assembly_definition.yaml", "plan.md", "todo.md", "journal.md", "assets/**", "renders/**", "reviews/**"]
      deny: []
    write:
      allow: ["plan.md", "todo.md", "journal.md", "objectives.yaml", "assembly_definition.yaml"]
      deny: ["skills/**", "utils/**", "reviews/**", "renders/**", "script.py", "**/*.py"]

  benchmark_reviewer:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "plan_refusal.md", "script.py", "**/*.py", "simulation_result.json", "validation_results.json", "renders/**", "journal.md"]
      deny: []
    write:
      allow: ["reviews/review-round-*/review.md"]
      deny: []

  electronics_planner:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "objectives.yaml", "assembly_definition.yaml", "plan.md", "todo.md", "journal.md"]
      deny: []
    write:
      allow: ["plan.md", "todo.md", "journal.md", "assembly_definition.yaml", "objectives.yaml"]
      deny: ["skills/**", "utils/**", "reviews/**", "renders/**", "script.py", "**/*.py"]

  electronics_reviewer:
    read:
      allow: ["/", ".", "config/**", "skills/**", "utils/**", "plan.md", "todo.md", "objectives.yaml", "assembly_definition.yaml", "plan_refusal.md", "script.py", "**/*.py", "simulation_result.json", "validation_results.json", "renders/**", "journal.md"]
      deny: []
    write:
      allow: ["reviews/review-round-*/review.md"]
      deny: []

  journalling_agent:
    read:
      allow: ["**"]
      deny: [".git/**", ".env", "**/secrets/**"]
    write:
      allow: ["journal.md"]
      deny: ["**"]

  skill_agent:
    read:
      allow: ["**"]
      deny: [".git/**", ".env", "**/secrets/**"]
    write:
      allow: ["suggested_skills/**", "journal.md"]
      deny: []
