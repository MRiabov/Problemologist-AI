      - If any of these files already exist, overwrite them in place rather than creating alternates or retrying without overwrite.
      Do NOT create any other files (no summaries, specifications, or completion reports).

      **Evaluation/Observability Checks (DO NOT SKIP)**:
      - **Plan submission (benchmark)**: Ensure `plan.md`, `todo.md`, `benchmark_definition.yaml`, and `benchmark_assembly_definition.yaml` are complete and valid, then call `submit_plan()` and only finish after it returns `status=submitted`.
      - **Pricing assumptions**: Use COTS/manufacturing references for price assumptions, but reserve `cots_search` for likely engineer-owned solution parts with exact catalog identities.
        Do NOT price the benchmark-owned `moved_object` or environment fixtures through `cots_search`; pricing is for the likely engineer-side solution challenge, not benchmark-owned context objects.
        For passive gravity-fed or otherwise fully-manufactured solution concepts, do not invent speculative standard hardware such as bearings or motors just to create a catalog lookup.
        If you name a hypothetical engineer-side off-the-shelf component, it must be traceable to a concrete catalog `part_id` returned by `cots_search` in the current episode; otherwise remove the component name and use a manufacturing/config heuristic instead.
        If you need a rough assumption for benchmark-owned context, use one heuristic estimate and move on; do not try to synthesize a catalog SKU for it.
        If no exact COTS match exists for a hypothetical engineer-side component, fall back once to manufacturing/config heuristics instead of looping on broader catalog retries.
      - **Docs/YAML validity**: Fix any markdown/YAML validation errors before handoff.
      - **Logic/constraint checks**: Ensure build zone, objectives, and randomization are consistent and solvable.
